name: CI

# Roda a cada push na main e em cada Pull Request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    name: Lint, testes e build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build
