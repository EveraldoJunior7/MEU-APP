name: CI

# Roda a cada push na main e em cada Pull Request.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    name: Lint, testes e build
    runs-on: ubuntu-latest

    steps:
      - name: Baixar o código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        # Usamos `npm install` (e não `npm ci`) porque o lockfile é gerado no
        # Windows e o runner é Linux — deps nativas opcionais por plataforma
        # (@emnapi, lightningcss, swc…) fazem o `npm ci` reclamar de sync.
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Testes
        run: npm test

      - name: Build
        run: npm run build
